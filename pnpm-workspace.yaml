packages:
  - packages/*
  - test

catalogMode: prefer

catalogs:
  build:
    roblox-ts: 3.0.0-dev-9165cde
  lint:
    '@eslint/config-inspector': ^1.4.2
    '@isentinel/eslint-config': ^4.7.9
    eslint: ^9.39.1
    eslint-plugin-pnpm: ^1.5.0
    eslint-plugin-react-hooks: ^7.0.1
    eslint-plugin-react-naming-convention: ^2.12.2
    eslint-plugin-react-x: ^2.12.2
  prod:
    '@rbxts/charm': ^0.10.0
    '@rbxts/luau-polyfill': ^1.1.3
    '@rbxts/remo': ^1.5.3
    '@rbxts/services': ^1.6.0
  script:
    '@commitlint/cli': ^20.4.1
    '@commitlint/config-angular': ^20.4.1
    '@commitlint/prompt-cli': ^20.4.2
    husky: ^9.1.7
    jiti: ^2.6.1
  types:
    '@commitlint/types': ^20.4.0
    '@rbxts/compiler-types': 3.0.0-types.0
    '@rbxts/types': ^1.0.906
    ts-plugin-sort-import-suggestions: ^1.0.4

cleanupUnusedCatalogs: true

configDependencies:
  '@pnpm/plugin-trusted-deps': 0.2.2+sha512-+ZupiXKJhW2fbSilfyRp+wrAY54MKg+c0JWSFGdeb/y9bUoYN5u4XLOZ0Txk7O2bBa6NMhWrX5mwmsHP3/nm9Q==

onlyBuiltDependencies:
  - unrs-resolver

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - webpack@4.47.0 || 5.102.1
  - '@babel/core@7.28.5'
